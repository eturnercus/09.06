name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libsdl2-dev fuse libfuse2 wget zip
          pip install -r requirements.txt pyinstaller
      - name: Build Linux + AppImage
        run: |
          mkdir -p artifacts
          ./build/build.sh
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            artifacts/WatchAlert-linux-x86_64
            artifacts/WatchAlert-x86_64.AppImage
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt pyinstaller
      - name: Build Windows exe
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $env:WATCHALERT_ROOT = $PWD
          python -m PyInstaller build/watchalert.spec --distpath build/pyinstaller-dist --workpath build/pyinstaller-work --noconfirm
          Copy-Item build/pyinstaller-dist/WatchAlert.exe artifacts/WatchAlert-windows-x86_64.exe
        shell: pwsh
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: artifacts/WatchAlert-windows-x86_64.exe
          if-no-files-found: error

  build-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package browser extensions
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
          ./build/build-extension.sh
      - name: Upload extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-build
          path: |
            artifacts/WatchAlert-Tab-chrome.zip
            artifacts/WatchAlert-Tab-firefox.zip
          if-no-files-found: error

  publish-release:
    needs: [build-linux, build-windows, build-extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: List release files
        run: find release-assets -type f | sort
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/WatchAlert-linux-x86_64
            release-assets/WatchAlert-x86_64.AppImage
            release-assets/WatchAlert-windows-x86_64.exe
            release-assets/WatchAlert-Tab-chrome.zip
            release-assets/WatchAlert-Tab-firefox.zip
