name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libsdl2-dev fuse libfuse2 wget zip
          pip install -r requirements.txt pyinstaller
      - name: Build Linux + AppImage
        run: |
          mkdir -p artifacts
          ./build/build.sh
      - name: Upload Linux artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/WatchAlert-linux-x86_64
            artifacts/WatchAlert-x86_64.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt pyinstaller
      - name: Build Windows exe
        run: |
          mkdir -p artifacts
          set WATCHALERT_ROOT=%CD%
          python -m PyInstaller build/watchalert.spec --distpath build/pyinstaller-dist --workpath build/pyinstaller-work --noconfirm
          copy build\pyinstaller-dist\WatchAlert.exe artifacts\WatchAlert-windows-x86_64.exe
        shell: cmd
      - name: Upload Windows artifact
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/WatchAlert-windows-x86_64.exe

  build-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package browser extensions
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
          ./build/build-extension.sh
      - name: Upload extension artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/WatchAlert-Tab-chrome.zip
            artifacts/WatchAlert-Tab-firefox.zip
